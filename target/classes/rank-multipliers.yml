# ═══════════════════════════════════════════════
#         FORGESTATION RANK MULTIPLIERS
# ═══════════════════════════════════════════════
# Hệ số nhân CHỈ ÁP DỤNG cho recipes có:
#   use-rank-multiplier: true
#
# Recipes không có flag này sẽ KHÔNG dùng multiplier

# Thứ tự ưu tiên: từ cao xuống thấp
# Plugin sẽ kiểm tra từ trên xuống, rank đầu tiên match sẽ được áp dụng
priority-order:
  - chiton
  - chantien
  - daithua
  - default

ranks:
  # ─────────────────────────────────────────────
  # Rank mặc định (tất cả player)
  # ─────────────────────────────────────────────
  default:
    display-name: "&7Thường"
    permission: "group.cmd"
    multiplier: 1

  # ─────────────────────────────────────────────
  # Rank Đại Thừa
  # ─────────────────────────────────────────────
  daithua:
    display-name: "&aĐại Thừa"
    permission: "rank.daithua"
    multiplier: 2

  # ─────────────────────────────────────────────
  # Rank Chân Tiên
  # ─────────────────────────────────────────────
  chantien:
    display-name: "&aChân Tiên"
    permission: "rank.chantien"
    multiplier: 2

  # ─────────────────────────────────────────────
  # Rank Chí Tôn (Premium)
  # ─────────────────────────────────────────────
  chiton:
    display-name: "&aChí Tôn"
    permission: "rank.tienthien"
    multiplier: 4
