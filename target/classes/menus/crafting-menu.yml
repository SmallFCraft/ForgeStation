  name: " "
  slots: ["0-8", "45-53"]

items:
  # ─────────────────────────────────────────────
  # CATEGORY TABS
  # ─────────────────────────────────────────────
  weapons-tab:
    slot: 2
    material: DIAMOND_SWORD
    glow: true
    name: "&6&lVũ Khí"
    lore:
      - ""
      - "&7Chế tạo vũ khí mạnh mẽ"
      - ""
      - "&e▶ Click để xem!"
    action:
      type: SWITCH_CATEGORY
      category: weapons

  exchange-tab:
    slot: 4
    material: EMERALD
    glow: true
    name: "&a&lĐổi Đồ"
    lore:
      - ""
      - "&7Đổi items lấy currency"
      - ""
      - "&e▶ Click để xem!"
    action:
      type: SWITCH_CATEGORY
      category: exchange

  materials-tab:
    slot: 6
    material: IRON_BLOCK
    glow: true
    name: "&7&lVật Liệu"
    lore:
      - ""
      - "&7Chế tạo vật liệu cơ bản"
      - ""
      - "&e▶ Click để xem!"
    action:
