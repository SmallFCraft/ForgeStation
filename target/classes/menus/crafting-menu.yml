# Auto Populate with Category Support
auto-populate:
  enabled: true
  # Shared slots for ALL categories
  slots: ["10-16", "19-25", "28-34"]
  # Default category when opening menu
  default-category: weapons
  recipe-type: "recipe"
  # Category definitions
  categories:
    weapons:
      folder: weapons
    exchange:
      folder: exchange
    blocks:
      folder: blocks
