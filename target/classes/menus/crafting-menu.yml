      - "&7Click để xem trang sau"
    action:
      type: NEXT_PAGE

  # ─────────────────────────────────────────────
  # BACK BUTTON
  # ─────────────────────────────────────────────
  back:
    slot: 49
    material: OAK_DOOR
    name: "&c&l◀ Quay Lại"
    lore:
      - "&7Về menu chính"
    action:
      type: OPEN_MENU
      menu: main-menu
