# ═══════════════════════════════════════════════
#              FORGESTATION CONFIG
# ═══════════════════════════════════════════════
# Author: phmyhu_1710
# Version: 1.0.0

# Debug mode (enable for development only - causes performance issues in production)
debug: false

# ─────────────────────────────────────────────
# Output Settings
# ─────────────────────────────────────────────
# Where do crafted/smelted items go?
# Options: INVENTORY, EXTRA_STORAGE, DROP, HOPPER
output:
  type: INVENTORY
  
  # If type is EXTRA_STORAGE
  extra-storage:
    enabled: false
    storage-id: "crafted_items"
  
  # If type is HOPPER
  hopper:
    search-radius: 3

# ─────────────────────────────────────────────
# Progress Settings (Smelting & Crafting)
# ─────────────────────────────────────────────
# Cho phép progress tiếp tục khi player offline
# Áp dụng cho cả Smelting và Crafting (nếu bật timer)
# true = thời gian vẫn tính khi offline, rejoin sẽ nhận item nếu đã xong
# false = tạm dừng khi offline, rejoin tiếp tục từ chỗ cũ
offline-progress: true

# ─────────────────────────────────────────────
# Performance Settings
# ─────────────────────────────────────────────
performance:
  # Placeholder cache TTL (seconds)
  placeholder-cache-ttl: 5
  
  # Rate limit between menu opens (milliseconds)
  menu-rate-limit: 500
  
  # Max cached player data entries
  max-player-cache: 1000

# ─────────────────────────────────────────────
# Hooks
# ─────────────────────────────────────────────
currency:
  vault: "&aBạc"
  playerpoints: "&bNguyên Thạch"
  exp: "&aEXP"
  coinengine: "&dCông Đức"

hooks:
  # Currency
  vault: true
  playerpoints: true
  coinengine: true
  # Items
  mmoitems: true
  extrastorage: true
  # Custom Items
  itemsadder: true
  oraxen: false
  nexo: false
  headdatabase: false
  # Placeholder
  placeholderapi: true
