# ═══════════════════════════════════════════════
#         FORGESTATION EXCHANGE RECIPES
# ═══════════════════════════════════════════════
# Recipes để đổi items lấy currency
# Các recipes này SỬ DỤNG rank multiplier

open_command:
  - doinguyenthach
  - doint
  - doidiem
recipes:
  # ─────────────────────────────────────────────
  # Đổi Kim Cương lấy %currency_playerpoints%
  # ─────────────────────────────────────────────
  doint_kc:
    enabled: true
    display-name: "&b&l💎 Đổi Kim Cương → %currency_playerpoints%"
    permission: "forgestation.exchange.diamond_points"
    
    # ⭐ BẬT RANK MULTIPLIER cho recipe này
    use-rank-multiplier: true
    
    # Cho phép đổi nhiều lần một lúc
    bulk-exchange: true
    
    # Icon trong menu
    icon:
      material: DIAMOND
      glow: true
      name: "&b&l💎 Đổi Kim Cương"
      lore:
        - ""
        - "&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
        - "&fTỷ lệ: &b1800 💎 &f→ &e1 %currency_playerpoints% &7(base)"
        - ""
        - "&fRank của bạn: &e%player_rank_display%"
        - "&fHệ số nhân: &ax%multiplier%"
        - "&fSẽ nhận: &e%estimated_points% %currency_playerpoints%"
        - "&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
        - ""
        - "&7Số lượng trong túi: &b%player_input%"
        - ""
        - "&e▶ Click trái: &fĐổi 1 lần"
        - "&e▶ Click phải: &fĐổi tất cả"
        - "&e▶ Shift+Click: &fNhập số lượng"
    
    # Nguyên liệu đầu vào
    input:
      type: EXTRA_STORAGE
      material: DIAMOND
      base-amount: 1800
    
    # Phần thưởng (sẽ nhân với multiplier)
    rewards:
      - type: PLAYER_POINTS
        base-amount: 1
    
    # Hiệu ứng khi thành công
    effects:
      sound: ENTITY_PLAYER_LEVELUP
      particles: VILLAGER_HAPPY

