# ═══════════════════════════════════════════════
#         FORGESTATION DUNGEON ARMOR RECIPES
# ═══════════════════════════════════════════════
# Nâng cấp giáp từng cấp: Sơ → Trung → Cao → Thượng.
# Mỗi set: 2 cục material → 1 piece Sơ | 3 + piece Sơ → Trung | 4 + piece Trung → Cao | 6 + piece Cao → Thượng.
# Armor/Material ID theo armor.yml & material.yml. Dùng MMOITEMS (mmoitems-type: ARMOR / MATERIAL).
# Nếu server dùng ItemsAdder cho giáp/nguyên liệu, cần map id tương ứng hoặc thêm hỗ trợ ITEMSADDER trong code.
# PLACEHOLDERS: placeholders (key: value) dùng %key% trong icon name & lore.

open_command:
  - dungeon
  - nangcapgiap
  - thiluyen

