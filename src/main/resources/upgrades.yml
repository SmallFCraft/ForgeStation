# ═══════════════════════════════════════════════
#           FORGESTATION UPGRADES
# ═══════════════════════════════════════════════
# 
# UPGRADE EFFECT MODES:
#   - FIXED: Giảm cố định X giây mỗi level (cũ)
#   - PERCENTAGE: Giảm X% mỗi level (mới - giá trị hơn)
#
# Ví dụ với PERCENTAGE (10% per level):
#   - Level 0: 30s base
#   - Level 1: 30s * 0.90 = 27s (-10%)
#   - Level 5: 30s * 0.50 = 15s (-50%)
#   - Level 10: 30s * 0.00 = 3s (min 3s) (-100% → capped)
#
# Batch smelting example:
#   - 10 items × 15s (level 5) = 150s total
#   - Without upgrade: 10 items × 30s = 300s
#   - Savings: 150s (50%)

upgrades:
  # ─────────────────────────────────────────────
  # Tốc độ chế tạo
  # ─────────────────────────────────────────────
  crafting_speed:
    display-name: "&6⚡ Tốc Độ Chế Tạo"
    description:
      - "&7Giảm thời gian cooldown"
      - "&7khi chế tạo vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-8% &7mỗi level"
      - "&7Max: &a-80% &7thời gian"
    max-level: 50
    
    # Chi phí mỗi level (expression với biến 'level')
    cost-per-level:
      vault: "45000 * level * level"
      exp: "50 * level"
    
    # Hiệu ứng cải tiến - PERCENTAGE based
    effect:
      type: REDUCE_CRAFT_COOLDOWN
      mode: PERCENTAGE  # PERCENTAGE hoặc FIXED
      percent-per-level: 2 
      min-duration: 1.5 # (Tính theo giây)
    
    # Icon trong menu upgrade
    icon:
      material: CLOCK
      slot: 11

  # ─────────────────────────────────────────────
  # Tốc độ nung
  # ─────────────────────────────────────────────
  smelting_speed:
    display-name: "&c🔥 Tốc Độ Nung"
    description:
      - "&7Giảm thời gian nung"
      - "&7vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-10% &7mỗi level"
      - "&7Max: &a-100% &7thời gian"
    max-level: 50
    
    cost-per-level:
      vault: "45000 * level * level"  # Chi phí tăng theo cấp số nhân
      exp: "50 * level"
    # Hiệu ứng cải tiến - PERCENTAGE based
    effect:
      type: REDUCE_SMELT_DURATION
      mode: PERCENTAGE
      percent-per-level: 2
      min-duration: 1.5  # Tính theo giây
    
    icon:
      material: FURNACE
      slot: 15


  # ─────────────────────────────────────────────
  # Tỉ lệ thành công chế tạo (cho recipe có chance < 100%)
  # Mỗi level cộng thêm % vào base chance. VD: recipe 50%, level 10 = 50 + 20 = 70%
  # ─────────────────────────────────────────────
  success_rate:
    display-name: "&a✦ Tỉ Lệ Thành Công"
    description:
      - "&7Tăng tỉ lệ thành công khi chế tạo"
      - "&7công thức có tỉ lệ (luyendan, v.v.)"
      - ""
      - "&7Hiệu ứng: &a+2% &7mỗi level"
      - "&7Max bonus: &a+50%"
    max-level: 25
    cost-per-level:
      vault: "50000 * level"
      exp: "30 * level"
    effect:
      type: CRAFT_SUCCESS_RATE
      percent-per-level: 2.0
    icon:
      material: EMERALD
      slot: 12

  # ─────────────────────────────────────────────
  # Chạy song song (1 main + N hàng chờ cùng lúc)
  # Lv.1 = 2 task, Lv.2 = 3 task, Lv.3 = 4 task...
  # Chi phí: 100000 EXP/level
  # ─────────────────────────────────────────────
  parallel_tasks:
    display-name: "&b⚡ Chạy Song Song"
    description:
      - "&7Nhiều task chế tạo/nung chạy"
      - "&7cùng lúc thay vì chờ từng cái."
      - ""
      - "&7Lv.1: 2 task | Lv.2: 3 task | ..."
    max-level: 5
    cost-per-level:
      exp: "100000"
    effect:
      type: PARALLEL_TASKS
    icon:
      material: BLAZE_POWDER
      slot: 14

  # ─────────────────────────────────────────────
  # Slot hàng chờ (mở thêm ô chờ khi chế tạo/nung)
  # Chi phí: 5000 Nguyên Thạch/level
  # ─────────────────────────────────────────────
  queue_slots:
    display-name: "&d📥 Slot Hàng Chờ"
    description:
      - "&7Mở thêm ô hàng chờ khi chế tạo/nung."
      - "&7Mỗi slot = thêm 1 công việc chờ xử lý."
      - ""
      - "&7Max: &a10 slot &7hàng chờ"
    max-level: 10
    cost-per-level:
      playerpoints: "5000"
    icon:
      material: HOPPER
      slot: 13
