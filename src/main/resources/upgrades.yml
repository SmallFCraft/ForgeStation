# ═══════════════════════════════════════════════
#           FORGESTATION UPGRADES
# ═══════════════════════════════════════════════
# 
# UPGRADE EFFECT MODES:
#   - FIXED: Giảm cố định X giây mỗi level (cũ)
#   - PERCENTAGE: Giảm X% mỗi level (mới - giá trị hơn)
#
# Ví dụ với PERCENTAGE (10% per level):
#   - Level 0: 30s base
#   - Level 1: 30s * 0.90 = 27s (-10%)
#   - Level 5: 30s * 0.50 = 15s (-50%)
#   - Level 10: 30s * 0.00 = 3s (min 3s) (-100% → capped)
#
# Batch smelting example:
#   - 10 items × 15s (level 5) = 150s total
#   - Without upgrade: 10 items × 30s = 300s
#   - Savings: 150s (50%)

upgrades:
  # ─────────────────────────────────────────────
  # Tốc độ chế tạo
  # ─────────────────────────────────────────────
  crafting_speed:
    display-name: "&6⚡ Tốc Độ Chế Tạo"
    description:
      - "&7Giảm thời gian cooldown"
      - "&7khi chế tạo vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-8% &7mỗi level"
      - "&7Max: &a-80% &7thời gian"
    max-level: 50
    
    # Chi phí mỗi level (expression với biến 'level')
    cost-per-level:
      vault: "100000 * level * level"
      exp: "50 * level"
    
    # Hiệu ứng cải tiến - PERCENTAGE based
    effect:
      type: REDUCE_CRAFT_COOLDOWN
      mode: PERCENTAGE  # PERCENTAGE hoặc FIXED
      percent-per-level: 1.5  
      min-duration: 0.5 # (Tính theo giây)
    
    # Icon trong menu upgrade
    icon:
      material: CLOCK
      slot: 11

  # ─────────────────────────────────────────────
  # Tốc độ nung
  # ─────────────────────────────────────────────
  smelting_speed:
    display-name: "&c🔥 Tốc Độ Nung"
    description:
      - "&7Giảm thời gian nung"
      - "&7vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-10% &7mỗi level"
      - "&7Max: &a-100% &7thời gian"
    max-level: 50
    
    cost-per-level:
      vault: "100000 * level * level"  # Chi phí tăng theo cấp số nhân
    
    # Hiệu ứng cải tiến - PERCENTAGE based
    effect:
      type: REDUCE_SMELT_DURATION
      mode: PERCENTAGE
      percent-per-level: 1.8
      min-duration: 0.5  # Tính theo giây
    
    icon:
      material: FURNACE
      slot: 15


  # ─────────────────────────────────────────────
  # Slot hàng chờ (mở thêm ô chờ khi chế tạo/nung)
  # Chi phí lấy từ config.yml queue.unlock-cost-playerpoints (mặc định 5000)
  # ─────────────────────────────────────────────
  queue_slots:
    display-name: "Slot hàng chờ"
    max-level: 10
    cost-per-level:
      playerpoints: "5000"
