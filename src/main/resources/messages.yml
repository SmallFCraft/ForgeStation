# ═══════════════════════════════════════════════
#           FORGESTATION MESSAGES
# ═══════════════════════════════════════════════
# Author: phmyhu_1710
# Modern styled messages with Unicode icons

# Prefix (sử dụng %prefix% trong các message khác)
prefix: "&8「&6&lForge&e&lStation&8」&r "

# ─────────────────────────────────────────────
# General
# ─────────────────────────────────────────────
reload: "%prefix%&a✓ &7Đã reload thành công trong &e%time%ms&7!"
no-permission: "%prefix%&c✗ &7Bạn không có quyền thực hiện điều này!"
player-only: "%prefix%&c✗ &7Lệnh này chỉ dành cho player!"
invalid-args: "%prefix%&c✗ &7Sử dụng: &e%usage%"

# ─────────────────────────────────────────────
# Exchange System
# ─────────────────────────────────────────────
exchange:
  started: "%prefix%&e⚡ &7Bắt đầu đổi &e%count%× %item%&7..."
  complete: "%prefix%&a✓ &7Đã đổi xong &e%item%&7!"
  success: "%prefix%&a✓ &7Nhận: &e%points% &6%currency%"
  refund: "%prefix%&7↩ Trả lại: &b%amount% &7items"
  not-enough: "%prefix%&c✗ &7Không đủ nguyên liệu! Cần: &e%required%"
  already-exchanging: "%prefix%&c✗ &7Bạn đang có quá trình đổi khác!"
  cancelled: "%prefix%&c✗ &7Đã hủy quá trình đổi!"

  # Bulk exchange
  bulk-prompt: "%prefix%&e⚡ &7Nhập số lượng muốn đổi &8(hoặc 'all'):"
  bulk-invalid: "%prefix%&c✗ &7Số lượng không hợp lệ!"
  bulk-max: "%prefix%&c✗ &7Tối đa có thể đổi: &e%max%"

  # Chat input for custom amount
  input-prompt: "%prefix%&e✎ &7Nhập số lượng muốn đổi &8(Ví dụ: &f1800&8, &f5k&8, &f1.5m&8, &fall&8)"
  input-invalid: "%prefix%&c✗ &7Số lượng không hợp lệ!"

# ─────────────────────────────────────────────
# Rank Info
# ─────────────────────────────────────────────
rank:
  your-rank: "%prefix%&7Rank: %rank_display%"
  multiplier-info: "%prefix%&7Hệ số nhân: &a×%multiplier%"

# ─────────────────────────────────────────────
# Crafting
# ─────────────────────────────────────────────
craft:
  # Instant mode messages
  success: "%prefix%&a✓ &7Chế tạo &e%item% &7thành công!"
  failed: "%prefix%&c✗ &7Không đủ nguyên liệu!"
  no-money: "%prefix%&c✗ &7Không đủ &e%currency%&7! Cần: &e%amount%"
  cooldown: "%prefix%&e⏳ &7Vui lòng chờ &e%time%&7!"
  no-space: "%prefix%&c✗ &7Inventory đầy!"
  
  # Timer mode messages (khi bật crafting.use-timer: true)
  started: "%prefix%&b⚒ &7Bắt đầu chế tạo &e%item%&7..."
  started-batch: "%prefix%&b⚒ &7Bắt đầu chế tạo &e%count%× %item%&7..."
  complete: "%prefix%&a✓ &7Đã chế tạo xong &e%item%&7!"
  cancelled: "%prefix%&c✗ &7Đã hủy quá trình chế tạo!"
  already-crafting: "%prefix%&c✗ &7Bạn đang có quá trình chế tạo khác!"
  # Persistence messages
  pending-delivered: "%prefix%&a📦 &7Bạn nhận được &e%count% &7items từ quá trình chế tạo khi offline!"
  complete-while-offline: "%prefix%&a✓ &7Quá trình chế tạo &e%item% &7đã hoàn tất khi bạn offline!"
  restored: "%prefix%&b⚒ &7Tiếp tục chế tạo &e%item%&7... Còn &e%time%&7!"
  # Batch input
  input-prompt: "%prefix%&e✎ &7Nhập số lượng muốn chế tạo &8(Ví dụ: &f10&8, &f5k&8, &fall&8)"
  input-invalid: "%prefix%&c✗ &7Số lượng không hợp lệ!"

# ─────────────────────────────────────────────
# Smelting
# ─────────────────────────────────────────────
smelt:
  started: "%prefix%&6🔥 &7Bắt đầu nung &e%item%&7..."
  started-batch: "%prefix%&6🔥 &7Bắt đầu nung &e%count%× %item%&7..."
  progress: "%prefix%&7Tiến độ: &e%progress%&7%"
  complete: "%prefix%&a✓ &7Đã nung xong &e%item%&7!"
  cancelled: "%prefix%&c✗ &7Đã hủy quá trình nung!"
  already-smelting: "%prefix%&c✗ &7Bạn đang có quá trình nung khác!"
  no-fuel: "%prefix%&c✗ &7Không đủ nhiên liệu!"
  no-permission: "%prefix%&c✗ &7Bạn không có quyền nung công thức này!"
  missing-materials: "%prefix%&c✗ &7Không đủ nguyên liệu! Cần: &e%amount%× %material%"
  missing-fuel: "%prefix%&c✗ &7Không đủ nhiên liệu! Cần: &e%amount%× %fuel%"
  # BATCH SMELTING: Chat input prompt
  input-prompt: "%prefix%&e✎ &7Nhập số lượng muốn nung &8(Ví dụ: &f10&8, &f5k&8, &fall&8)"
  input-invalid: "%prefix%&c✗ &7Số lượng không hợp lệ!"
  # SMELTING PERSISTENCE: Messages cho persistence system
  pending-delivered: "%prefix%&a📦 &7Bạn nhận được &e%count% &7items từ quá trình nung khi offline!"
  complete-while-offline: "%prefix%&a✓ &7Quá trình nung &e%item% &7đã hoàn tất khi bạn offline!"
  restored: "%prefix%&6🔥 &7Tiếp tục nung &e%item%&7... Còn &e%time%&7!"

# ─────────────────────────────────────────────
# Upgrade
# ─────────────────────────────────────────────
upgrade:
  success: "%prefix%&a⬆ &7Nâng cấp &e%upgrade% &7lên level &6%level%&7!"
  max-level: "%prefix%&c✗ &7Đã đạt level tối đa &8(&e%max%&8)&7!"
  no-money: "%prefix%&c✗ &7Không đủ tiền nâng cấp! Cần: &e%cost%"

# ─────────────────────────────────────────────
# Menu
# ─────────────────────────────────────────────
menu:
  loading: "&7⌛ Đang tải..."
  rate-limited: "%prefix%&e⏳ &7Vui lòng chờ một chút!"
