name: ForgeStation
version: "${project.version}"
main: com.phmyhu1710.forgestation.ForgeStationPlugin
api-version: "1.21"
authors:
  - phmyhu_1710
description: |
  Advanced crafting and smelting system with rank multipliers,
  custom recipes, MMOItems integration, and more!
website: https://github.com/SmallFCraft/ForgeStation
folia-supported: true
prefix: ForgeStation

softdepend:
  - Vault
  - PlayerPoints
  - CoinsEngine
  - MMOItems
  - ExtraStorage
  - PlaceholderAPI

commands:
  forgestation:
    description: Main command for ForgeStation crafting system
    aliases: [fs, forge, loren, crafting]
    usage: |
      /<command> - Mở menu chính (cần forgestation.use)
      /<command> menu - Mở menu chính
      /<command> menu recipes - Mở menu chế tạo
      /<command> menu upgrades - Mở menu nâng cấp
      /<command> menu smelting - Mở menu nung
      /<command> cat <id> - Mở menu theo category (blocks, exchange, ores...)
      /<command> help - Xem hướng dẫn
      /<command> reload - Reload plugin (cần forgestation.reload)
      /<command> cancel - Hủy task đang chạy (cần forgestation.cancel)
      /<command> setlevel <player> <upgrade_id> <level> - Đặt level nâng cấp (admin, cần forgestation.setlevel)
      /<command> addlevel <player> <upgrade_id> <amount> - Cộng level nâng cấp (admin, cần forgestation.addlevel)

permissions:
  forgestation.admin:
    description: Full admin access to ForgeStation
    default: op
    children:
      forgestation.reload: true
      forgestation.use: true
      forgestation.cancel: true
      forgestation.setlevel: true
      forgestation.addlevel: true
      forgestation.craft.*: true
      forgestation.smelt.*: true
      forgestation.upgrade.*: true
  forgestation.setlevel:
    description: Đặt level nâng cấp cho player (/fs setlevel <player> <upgrade_id> <level>). Dành cho admin/OP.
    default: op
  forgestation.addlevel:
    description: Cộng level nâng cấp cho player (/fs addlevel <player> <upgrade_id> <amount>). Dành cho admin/OP.
    default: op
  forgestation.cancel:
    description: Hủy task đang chạy (/fs cancel hoặc click nút Hủy task trong GUI)
    default: op
  forgestation.reload:
    description: Reload ForgeStation configurations
    default: op
  forgestation.use:
    description: Mở menu (/fs, /fs menu, /fs cat <id>) và lệnh custom (craftnhanh, nungquang...). OP có sẵn; không OP cần grant qua permission plugin.
    default: op
  forgestation.craft.*:
    description: Access all crafting recipes
    default: op
  forgestation.smelt.*:
    description: Access all smelting recipes
    default: op
  forgestation.upgrade.*:
    description: Access all upgrades
    default: op
