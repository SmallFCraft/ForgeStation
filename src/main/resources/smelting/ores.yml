# ═══════════════════════════════════════════════
#           FORGESTATION ORE SMELTING
# ═══════════════════════════════════════════════
# Công thức nung quặng cơ bản
#
# UNIFIED FORMAT PLACEHOLDERS:
# %input_material% - Tên nguyên liệu đầu vào
# %input_amount% - Số lượng cần
# %owned_input% - Số lượng player đang có
# %input_status% - Trạng thái (✓/✗)
# %output_material% - Tên sản phẩm
# %output_amount% - Số lượng nhận
# %fuel_material% - Tên nhiên liệu
# %fuel_amount% - Số nhiên liệu cần
# %owned_fuel% - Số nhiên liệu đang có
# %fuel_status% - Trạng thái nhiên liệu
# %duration% - Thời gian nung (giây)
# %smelting_level% - Level nung của player
# %reduction% - Giảm thời gian (giây)
# %max_batch% - Số batch tối đa có thể nung
# %status% - Trạng thái tổng hợp

open_command:
  - smelting
  - nungquang
  - nungore
smelting:
  # ─────────────────────────────────────────────
  # Nung Sắt
  # ─────────────────────────────────────────────
  iron_ore_smelting:
    enabled: true
    display-name: "&7🔥 Nung Sắt"
    permission: "forgestation.smelt.iron"

    icon:
      material: RAW_IRON
      slot: 11
      name: "&7🔥 Nung Sắt"
      lore:
        - ""
        - "&8━━━━━━━━━━━━━━━━━━━━━━━━━"
        - "&f&lNGUYÊN LIỆU:"
        - "&8┃ &7» &fRaw Iron &8× &e%input_amount% %input_status%"
        - "&8┃   &7Đang có: &b%owned_input%"
        - "&8━━━━━━━━━━━━━━━━━━━━━━━━━"
        - "&f&lNHIÊN LIỆU:"
        - "&8┃ &7» &fCoal &8× &e%fuel_amount% %fuel_status%"
        - "&8┃   &7Đang có: &b%owned_fuel%"
        - "&8━━━━━━━━━━━━━━━━━━━━━━━━━"
        - "&f&lSẢN PHẨM:"
        - "&8┃ &7» &fIron Ingot &8× &a%output_amount%"
        - "&8━━━━━━━━━━━━━━━━━━━━━━━━━"
        - ""
        - "&7Level nung: &e%smelting_level% &8| &7Giảm: &a-%reduction%s"
        - "&7Thời gian: &e%duration%s &8| &7Max batch: &e%max_batch%"
        - ""
        - "&7Trạng thái: %status%"
        - ""
        - "&e▶ Click trái: &fNung 1 lần"
        - "&e▶ Click phải: &fNung tất cả"
        - "&e▶ Shift+Click: &fNhập số lượng"

    input:
      type: EXTRA_STORAGE
      material: RAW_IRON
      amount: 1

    output:
      type: EXTRA_STORAGE
      material: IRON_INGOT
      amount: 1

    duration: 15

    fuel:
      enabled: true
      type: EXTRA_STORAGE
      material: COAL
      amount: 1

