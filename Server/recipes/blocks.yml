#
# PLACEHOLDERS: Mỗi recipe có thể có section "placeholders:" (key: value).
#   Trong icon name & lore dùng %key% → thay bằng value. Tránh lặp tên (vd. "Khối Lưu Ly" 1 lần, dùng %item_name%).
#   Ví dụ: placeholders: { item_name: "Khối Lưu Ly", material_name: "Lưu Ly" }
#   → name: "&9&lChế Tạo %item_name%"  |  lore: "&fSẽ nhận: &e%estimated_points% %item_name%"
#
open_command:
  - craftnhanh
  - chetaonhanh
  - craftblock
recipes:
  block_coal:
    enabled: true
    display-name: "&f&lChế Tạo Khối Than"
    duration: 0.1
    bulk-exchange: true
    placeholders:
      item_name: "Khối Than"
      material_name: "Than"
    icon:
      material: COAL_BLOCK
      glow: true
      name: "&f&lChế Tạo %item_name%"
      lore:
        - ""
        - "&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
        - "&fTỷ lệ: &b9 %material_name% &f→ &e1 %item_name% &7(base)"
        - ""

        - "&fSẽ nhận: &e%estimated_points% %item_name%"
        - "&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
        - ""
        - "&7Số lượng trong túi: &b%player_input%"
        - ""
        - "&e▶ Click trái: &fĐổi 1 lần"
        - "&e▶ Click phải: &fĐổi tất cả"
        - "&e▶ Shift+Click: &fNhập số lượng"

    # Nguyên liệu đầu vào
    input:
      type: EXTRA_STORAGE
      material: COAL
      base-amount: 9

    rewards:
      - type: EXTRA_STORAGE
        material: COAL_BLOCK
        base-amount: 1

    # Hiệu ứng khi thành công
    effects:
      sound: ENTITY_PLAYER_LEVELUP
      particles: VILLAGER_HAPPY
