# ═══════════════════════════════════════════════
#           FORGESTATION UPGRADES
# ═══════════════════════════════════════════════
#
# UPGRADE EFFECT MODES:
#   - FIXED: Giảm cố định X giây mỗi level (cũ)
#   - PERCENTAGE: Giảm X% mỗi level (mới - giá trị hơn)
#
# min-duration: Thời gian tối thiểu MỖI ITEM (giây). Nên đặt <= duration nhỏ nhất
#   trong recipe/smelting (vd. 0.1s) để nâng cấp không làm recipe nhanh bị CHẬM hơn.
#   Recipe trong project: 0.1s (ore/block/event), 3s (luyendan), 30–180s (metals/weapons).
#
# Ví dụ PERCENTAGE 2%/level, max 50, min-duration 0.1s:
#   - Recipe 0.1s: level 50 → vẫn 0.1s (sàn min), không bị lên 1.5s.
#   - Recipe 30s: level 50 → 0.1s/item (100% giảm, sàn 0.1s).
#   - Recipe 180s: level 50 → 0.1s/item.
#
# KHI ĐỔI CONFIG (max-level, min-duration, percent-per-level):
#   - Level player lưu trong DB không đổi; hiệu ứng tính theo "effective level"
#     = min(level trong DB, max-level trong config). Ví dụ: giảm max 50→25,
#     player có level 50 vẫn giữ 50 trong DB nhưng hiệu ứng chỉ tính như 25.
#   - Menu/placeholder hiển thị effective level (vd. 25/25), không crash.

upgrades:
  # ─────────────────────────────────────────────
  # Tốc độ chế tạo
  # ─────────────────────────────────────────────
  crafting_speed:
    display-name: "&6⚡ Tốc Độ Chế Tạo"
    description:
      - "&7Giảm thời gian cooldown"
      - "&7khi chế tạo vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-2% &7mỗi level"
      - "&7Max: &a-100% &7(thời gian tối thiểu &e0.1s&7/item)"
    max-level: 50
    
    # Chi phí mỗi level (expression với biến 'level')
    cost-per-level:
      vault: "15000 * level * level"
      exp: "2000 * level"
    
    # Hiệu ứng cải tiến - PERCENTAGE based
    effect:
      type: REDUCE_CRAFT_COOLDOWN
      mode: PERCENTAGE  # PERCENTAGE hoặc FIXED
      percent-per-level: 2
      min-duration: 0  # <= recipe nhanh nhất (0.1s), tránh nâng cấp làm chậm
    icon:
      material: CLOCK
      slot: 11

  # ─────────────────────────────────────────────
  # Tốc độ nung
  # ─────────────────────────────────────────────
  smelting_speed:
    display-name: "&c🔥 Tốc Độ Nung"
    description:
      - "&7Giảm thời gian nung"
      - "&7vật phẩm."
      - ""
      - "&7Hiệu ứng: &a-2% &7mỗi level"
      - "&7Max: &a-100% &7(thời gian tối thiểu &e0.1s&7/item)"
    max-level: 50
    
    cost-per-level:
      vault: "15000 * level * level"  # Chi phí tăng theo cấp số nhân
      exp: "2000 * level"
    effect:
      type: REDUCE_SMELT_DURATION
      mode: PERCENTAGE
      percent-per-level: 2
      min-duration: 0  # <= ore nhanh nhất (0.1s), tránh nâng cấp làm chậm
    icon:
      material: FURNACE
      slot: 15


  # ─────────────────────────────────────────────
  # Tỉ lệ thành công chế tạo (cho recipe có chance < 100%)
  # Mỗi level cộng thêm % vào base chance. VD: recipe 50%, level 10 = 50 + 20 = 70%
  # ─────────────────────────────────────────────
  success_rate:
    display-name: "&a✦ Tỉ Lệ Thành Công"
    description:
      - "&7Tăng tỉ lệ thành công khi chế tạo"
      - "&7công thức có tỉ lệ (luyendan, v.v.)"
      - ""
      - "&7Hiệu ứng: &a+2% &7mỗi level"
      - "&7Max bonus: &a+50%"
    max-level: 25
    cost-per-level:
      vault: "50000 * level"
      exp: "1000 * level"
    effect:
      type: CRAFT_SUCCESS_RATE
      percent-per-level: 2.0
    icon:
      material: EMERALD
      slot: 12

  # ─────────────────────────────────────────────
  # Chạy song song (1 main + N hàng chờ cùng lúc)
  # Lv.1 = 2 task, Lv.2 = 3 task, Lv.3 = 4 task...
  # Chi phí: 100000 EXP/level
  # ─────────────────────────────────────────────
  parallel_tasks:
    display-name: "&b⚡ Chạy Song Song"
    description:
      - "&7Nhiều task chế tạo/nung chạy"
      - "&7cùng lúc thay vì chờ từng cái."
      - ""
      - "&7Lv.1: 2 task | Lv.2: 3 task | ..."
    max-level: 5
    cost-per-level:
      exp: "100000"
    effect:
      type: PARALLEL_TASKS
    icon:
      material: BLAZE_POWDER
      slot: 14

  # ─────────────────────────────────────────────
  # Slot hàng chờ (mở thêm ô chờ khi chế tạo/nung)
  # Chi phí: 5000 Nguyên Thạch/level
  # ─────────────────────────────────────────────
  queue_slots:
    display-name: "&d📥 Slot Hàng Chờ"
    description:
      - "&7Mở thêm ô hàng chờ khi chế tạo/nung."
      - "&7Mỗi slot = thêm 1 công việc chờ xử lý."
      - ""
      - "&7Max: &a10 slot &7hàng chờ"
    max-level: 10
    cost-per-level:
      playerpoints: "5000"
    icon:
      material: HOPPER
      slot: 13
