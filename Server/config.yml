# ═══════════════════════════════════════════════
#              FORGESTATION CONFIG
# ═══════════════════════════════════════════════
# Author: phmyhu_1710
# Version: 1.0.0

# Debug mode (enable for development only - causes performance issues in production)
debug: false

# ─────────────────────────────────────────────
# Output Settings
# ─────────────────────────────────────────────
# Where do crafted/smelted items go?
# Options: INVENTORY, EXTRA_STORAGE, DROP, HOPPER
output:
  type: EXTRA_STORAGE
  
  # If type is EXTRA_STORAGE
  extra-storage:
    enabled: true
    storage-id: "crafted_items"
  
  # If type is HOPPER
  hopper:
    search-radius: 3

# ─────────────────────────────────────────────
# Progress Settings (Smelting & Crafting)
# ─────────────────────────────────────────────
# Cho phép progress tiếp tục khi player offline
# Áp dụng cho cả Smelting và Crafting (nếu bật timer)
# true = thời gian vẫn tính khi offline, rejoin sẽ nhận item nếu đã xong
# false = tạm dừng khi offline, rejoin tiếp tục từ chỗ cũ
offline-progress: true

# ─────────────────────────────────────────────
# Persistence (Chống mất data khi reload / crash / restart)
# ─────────────────────────────────────────────
# Lưu tasks + hàng chờ vào DB mỗi N giây.
# - Reload plugin, PlugMan reload, hoặc restart server: tiến trình nung/craft được lưu khi tắt
#   và khôi phục khi bật lại (hoặc khi player join).
# - Server crash/kill: dữ liệu lần lưu gần nhất sẽ được restore khi player join.
# 0 = tắt định kỳ (vẫn lưu khi disable); 30 = mỗi 30s (khuyến nghị)
persistence:
  save-interval-seconds: 30

# ─────────────────────────────────────────────
# Queue (Hàng chờ) - Crafting & Smelting
# ─────────────────────────────────────────────
# Slot hàng chờ: nâng cấp trong upgrade-menu. Chi phí mở 1 slot → config trong upgrades.yml (queue_slots).
# Slots hiển thị trong crafting-menu và smelting-menu (vị trí ô trong GUI)
queue:
  # Slots trong menu (index 0-9 = 10 ô hàng chờ). Tránh 45=prev, 53=next
  slots: [38, 39, 40, 41, 42, 47, 48, 49, 50, 51]
  max-slots: 10
  # Ô trống (đã mở, chưa có task) — material + tên
  empty-slot:
    material: LIME_STAINED_GLASS_PANE
    name: "&7Ô trống"
  # Ô chưa mở (chưa nâng cấp) — material + tên + lore
  locked-slot:
    material: RED_STAINED_GLASS_PANE
    name: "&cChưa mở"
    lore:
      - "&7Nâng cấp trong menu Nâng cấp"
  # Nhãn hiển thị trên item đang trong hàng chờ (vd. "Hàng chờ #1", "Click để hủy")
  pending-label: "&7Hàng chờ #%index%"
  pending-lore-cancel: "&cClick để hủy"

# ─────────────────────────────────────────────
# Performance Settings
# ─────────────────────────────────────────────
performance:
  # Placeholder cache TTL (seconds)
  placeholder-cache-ttl: 5
  
  # Rate limit between menu opens (milliseconds)
  menu-rate-limit: 500
  
  # Max cached player data entries
  max-player-cache: 1000

# ─────────────────────────────────────────────
# Currency
# ─────────────────────────────────────────────
currency:
  vault: "&aBạc"
  playerpoints: "&bNguyên Thạch"
  exp: "&aEXP"
  coinengine: "&dCông Đức"

# ─────────────────────────────────────────────
# Hooks
# ─────────────────────────────────────────────
hooks:
  # Currency
  vault: true
  playerpoints: true
  coinengine: true
  # Items
  mmoitems: true
  extrastorage: true
  # Custom Items
  itemsadder: true
  oraxen: false
  nexo: false
  headdatabase: false
  # Placeholder
  placeholderapi: true
